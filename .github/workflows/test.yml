name: Smoke-Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax-Check Worker
        run: node --check functions/api/check.js
      - name: HTML-Validity
        run: |
          test -f index.html && echo "index.html present"
          grep -q "DOCTYPE html" index.html
